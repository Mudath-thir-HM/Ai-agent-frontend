[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Long-lived cache for hashed asset chunks — safe because Vite
# fingerprints every filename on content change.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html must never be cached so deploys take effect immediately.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Proxy /api calls to the backend to avoid CORS preflight on every request.
# Replace the placeholder with your actual deployed backend URL,
# e.g. https://your-api.railway.app
#
# Uncomment when your backend is deployed:
#
# [[redirects]]
#   from   = "/api/*"
#   to     = "https://your-backend-url.com/api/:splat"
#   status = 200
#   force  = true